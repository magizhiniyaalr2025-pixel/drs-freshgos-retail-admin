name: Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/YOUR_PROJECT_NUMBER/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "fastapi-run-sa@YOUR_PROJECT_ID.iam.gserviceaccount.com"

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker asia-south1-docker.pkg.dev

      - name: Build & Push Identity
        run: |
          docker build -f services/identity-service/Dockerfile -t asia-south1-docker.pkg.dev/$PROJECT_ID/fastapi-repo/identity-service .
          docker push asia-south1-docker.pkg.dev/$PROJECT_ID/fastapi-repo/identity-service

      - name: Deploy Identity
        run: |
          gcloud run deploy identity-service \
            --image asia-south1-docker.pkg.dev/$PROJECT_ID/fastapi-repo/identity-service \
            --region asia-south1 \
            --platform managed \
            --allow-unauthenticated

      # Repeat for import-service
