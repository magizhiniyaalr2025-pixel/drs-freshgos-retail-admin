name: Deploy FastAPI Microservices (Cloud Run - WIF)

on:
  push:
    branches:
      - main

# 🔐 IMPORTANT: REQUIRED for WIF
permissions:
  id-token: write
  contents: read

env:
  PROJECT_ID: drs-freshgos-retail-admin-123
  REGION: asia-south1
  REPOSITORY: fastapi-repo

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------
      # 1. Checkout code
      # -----------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------
      # 2. Authenticate to GCP (WIF - NO KEY)
      # -----------------------------------
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # -----------------------------------
      # 3. Setup gcloud CLI
      # -----------------------------------
      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # -----------------------------------
      # 4. Docker auth for Artifact Registry
      # -----------------------------------
      - name: Configure Docker authentication
        run: |
          gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

      # =====================================================
      # 🟢 BUILD + PUSH + DEPLOY: Identity Service
      # =====================================================
      - name: Build Identity Service
        run: |
          docker build \
            -f services/identity-service/Dockerfile \
            -t $REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/identity-service:latest \
            .

      - name: Push Identity Service
        run: |
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/identity-service:latest

      - name: Deploy Identity Service to Cloud Run
        run: |
          gcloud run deploy identity-service \
            --image $REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/identity-service:latest \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --service-account fastapi-run-sa@$PROJECT_ID.iam.gserviceaccount.com \
            --set-env-vars "MONGO_URI=${{ secrets.MONGO_URI }},DB_NAME=${{ secrets.DB_NAME }},SECRET_KEY=${{ secrets.SECRET_KEY }}"

      # =====================================================
      # 🔵 BUILD + PUSH + DEPLOY: Import Service
      # =====================================================
      - name: Build Import Service
        run: |
          docker build \
            -f services/import-service/Dockerfile \
            -t $REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/import-service:latest \
            .

      - name: Push Import Service
        run: |
          docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/import-service:latest

      - name: Deploy Import Service to Cloud Run
        run: |
          gcloud run deploy import-service \
            --image $REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/import-service:latest \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --service-account fastapi-run-sa@$PROJECT_ID.iam.gserviceaccount.com \
            --set-env-vars "MONGO_URI=${{ secrets.MONGO_URI }},DB_NAME=${{ secrets.DB_NAME }},SECRET_KEY=${{ secrets.SECRET_KEY }}"